<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón Masivo - OTEC UNO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-3xl mx-auto py-12 px-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900 uppercase">Buzón de Comunicaciones</h1>
            <p class="text-gray-500 font-medium">Envío masivo de correos por grupo</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="p-4 mb-6 text-white text-center font-bold rounded-lg shadow-md {% if message.tags == 'error' %}bg-red-500{% elif message.tags == 'warning' %}bg-yellow-500{% else %}bg-green-500{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <form method="POST" onsubmit="return confirm('¿Está seguro de enviar estos correos masivos? Esta acción no se puede deshacer.');">
                {% csrf_token %}
                
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">1. Seleccione el Grupo Destino</label>
                    <select name="grupo" required class="w-full p-4 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold uppercase">
                        <option value="">-- Elija un grupo --</option>
                        {% for g in grupos %}
                            <option value="{{ g }}">{{ g }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-2">2. Seleccione el Tipo de Mensaje</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="cursor-pointer border border-gray-200 rounded-xl p-4 flex items-center hover:bg-blue-50 transition">
                            <input type="radio" name="tipo_correo" value="bienvenida" required class="w-5 h-5 accent-blue-600 mr-3">
                            <div>
                                <div class="font-bold text-blue-900">👋 Bienvenida al Curso</div>
                                <div class="text-xs text-gray-500">Envía un saludo general.</div>
                            </div>
                        </label>
                        
                        <label class="cursor-pointer border border-gray-200 rounded-xl p-4 flex items-center hover:bg-blue-50 transition">
                            <input type="radio" name="tipo_correo" value="comprobante" required class="w-5 h-5 accent-blue-600 mr-3">
                            <div>
                                <div class="font-bold text-blue-900">📜 Comprobante de Matrícula</div>
                                <div class="text-xs text-gray-500">Incluye datos del curso y RUT.</div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="mb-8 p-4 bg-blue-50 border border-blue-100 rounded-xl">
                    <label class="block text-sm font-bold text-blue-900 mb-2">3. Horario del Curso (Solo para correos de Bienvenida)</label>
                    <p class="text-xs text-blue-700 mb-2">Pegue aquí los días y horas. Se insertará automáticamente en el mensaje de bienvenida.</p>
                    <textarea name="horario_curso" rows="4" placeholder="Ej: Lunes, Miércoles y Viernes de 19:00 a 22:00 hrs." 
                              class="w-full p-4 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-800 transition transform hover:-translate-y-0.5 flex justify-center items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    ENVIAR CORREOS MASIVOS
                </button>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="/admin/" class="text-sm font-bold text-gray-400 hover:text-blue-600 underline">Volver al Panel de Administración</a>
        </div>
    </div>
</body>
</html>
