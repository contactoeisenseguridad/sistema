<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Documentos - OTEC UNO</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 400px; }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; color: #bbb; }
        select, input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; margin-top: 25px; padding: 12px; background: #3498db; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📂 Generador Masivo</h2>
        <form method="POST">
            {% csrf_token %}
            <label>1. Seleccionar Plantilla:</label>
            <select name="plantilla" required>
                {% for p in plantillas %}
                    <option value="{{ p.id }}">{{ p.nombre }}</option>
                {% endfor %}
            </select>

            <label>2. Código del Grupo:</label>
            <input type="text" name="grupo" placeholder="Ej: FGS352026" required>

            <label>3. Módulo (Para cálculo de asistencia):</label>
            <select name="modulo" required>
                {% for m in modulos %}
                    <option value="{{ m.id }}">{{ m.nombre }}</option>
                {% endfor %}
            </select>

            <button type="submit">🚀 Generar Documentos para Impresión</button>
        </form>
    </div>
</body>
</html>
