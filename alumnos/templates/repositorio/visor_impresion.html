<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Impresión Masiva - OTEC UNO</title>
    <style>
        /* Vista en el navegador */
        body { 
            background: #525659; 
            color: #000; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .no-print-bar { 
            background: #1e1e1e; 
            padding: 15px; 
            text-align: center; 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn { 
            padding: 12px 30px; 
            background: #2ecc71; 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 15px;
        }
        .btn:hover {
            background: #27ae60;
        }
        
        .print-container {
            padding-top: 80px; /* Evita que la barra tape el contenido */
        }

        /* CONFIGURACIÓN DE LA HOJA */
        .seccion-documento {
            background: white;
            width: 21cm;
            min-height: 29.7cm;
            margin: 30px auto;
            padding: 2.5cm;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            
            /* Salto de página nativo */
            page-break-after: always;
            break-after: page;
            display: block;
            clear: both;
        }

        /* Vista al Imprimir / Guardar PDF */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body { 
                background: white; 
            }
            .no-print-bar { 
                display: none !important; 
            }
            .print-container {
                padding-top: 0 !important;
            }
            .seccion-documento { 
                margin: 0 !important; 
                padding: 2cm !important; 
                box-shadow: none !important; 
                width: 21cm !important;
                height: 29.7cm !important;
                page-break-after: always !important;
                break-after: page !important;
                display: block !important;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-bar">
        <button class="btn" onclick="window.print()">🖨️ Mandar a Impresora / Guardar como PDF</button>
    </div>

    <div class="print-container">
        {% for doc in documentos %}
            <div class="seccion-documento">
                {{ doc|safe }}
            </div>
        {% endfor %}
    </div>

</body>
</html>
