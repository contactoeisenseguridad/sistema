<!DOCTYPE html>
<html>
<head>
    <title>PRUEBA DE IMPRESION</title>
</head>
<body style="background: white; color: black; padding: 50px;">

    <h1 style="color: red;">SI VES ESTO, EL VISOR CARGÓ</h1>
    <hr>

    {% for doc in documentos %}
        <div style="border: 5px solid blue; margin: 20px; padding: 20px;">
            {{ doc|safe }}
        </div>
    {% empty %}
        <p style="font-size: 24px; color: orange;">
            LA LISTA 'documentos' ESTÁ VACÍA (Python no envió nada).
        </p>
    {% endfor %}

</body>
</html>
