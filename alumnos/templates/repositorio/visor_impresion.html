<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Impresión Masiva - OTEC UNO</title>
    <style>
        /* Estilos para vista en pantalla */
        body { 
            background: #525659; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: Arial, sans-serif;
        }
        
        .no-print-header {
            background: #2ecc71;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 100;
            cursor: pointer;
            border: none;
        }

        .documento-pagina {
            background: white;
            color: black;
            width: 21cm;
            min-height: 29.7cm; /* Tamaño A4 */
            padding: 1.5cm;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        /* Estilos para IMPRESIÓN REAL */
        @media print {
            body { background: white; padding: 0; }
            .no-print-header { display: none; }
            .documento-pagina {
                margin: 0;
                box-shadow: none;
                page-break-after: always; /* Obliga a cambiar de hoja por alumno */
                border: none;
            }
        }
    </style>
</head>
<body>

    <button class="no-print-header" onclick="window.print()">
        🖨️ Mandar a Impresora / Guardar como PDF
    </button>

    <div class="contenedor-masivo">
        {% for doc in documentos %}
            <div class="documento-pagina">
                {{ doc|safe }}
            </div>
        {% empty %}
            <div class="documento-pagina">
                <p style="text-align: center; color: red; font-weight: bold;">
                    ⚠️ Error: No se generaron documentos. Verifica el Código del Grupo.
                </p>
            </div>
        {% endfor %}
    </div>

</body>
</html>
